appId: com.ai-kindle.app
productName: AI Kindle
copyright: Copyright © 2025 AI Kindle

# Only ship the built output + the package.json itself; everything
# needed is under out/ (main, preload, renderer) once `npm run build` runs.
files:
  - out/**/*
  - package.json
  - "!**/.vscode"
  - "!{.eslintrc*,.prettier*,.editorconfig,.gitignore,.github}"
  - "!{dist,release,build}"

# Native modules (better-sqlite3) have to be rebuilt for Electron's Node ABI
# and their .node files kept as-is in app.asar.unpacked so Electron can
# dlopen them at runtime.
asar: true
asarUnpack:
  - "**/node_modules/better-sqlite3/**/*"
  - "**/node_modules/bindings/**/*"
  - "**/node_modules/file-uri-to-path/**/*"

directories:
  output: release
  buildResources: resources

# Copy the app icon into the packaged Resources folder so the main
# process can load it at runtime (see `resolveIconPath()` in src/main).
# This is separate from `mac.icon` / `win.icon`, which only control the
# built-in app bundle / exe icon.
extraResources:
  - from: resources/icon.png
    to: icon.png

# ─── macOS ─────────────────────────────────────────────────────────────
mac:
  category: public.app-category.productivity
  icon: resources/icon.png
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  # Unsigned builds are fine for local distribution. Users will need to
  # right-click → Open on first launch. To sign + notarize set CSC_LINK
  # and the APPLE_* env vars and flip `identity` back on.
  identity: null
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64

dmg:
  title: ${productName} ${version}
  icon: resources/icon.png
  contents:
    - x: 140
      y: 180
      type: file
    - x: 400
      y: 180
      type: link
      path: /Applications

# ─── Windows ───────────────────────────────────────────────────────────
win:
  icon: resources/icon.png
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  publisherName: AI Kindle

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: AI Kindle

# ─── Linux ─────────────────────────────────────────────────────────────
linux:
  category: Office
  icon: resources/icon.png
  # Force a clean, no-spaces executable name so the binary path inside the
  # .deb is /opt/AI Kindle/ai-kindle and the .desktop file's Exec= line
  # resolves cleanly. Spaces in executable paths confuse some shells
  # and a few desktop environments.
  executableName: ai-kindle
  synopsis: A local, AI-assisted PDF study companion
  description: |
    AI Kindle is a desktop app for reading, annotating, and studying PDFs with
    local AI assistance powered by Ollama. All PDFs and annotations stay on
    your machine.

  # Explicit .desktop entry so the app reliably appears in the GNOME
  # Activities overview, Files / Nautilus right-click → "Open With…",
  # KDE's Kickoff menu, and the XFCE Whisker menu. Without this block
  # electron-builder still ships a .desktop file, but with sparse fields
  # that some desktop environments quietly ignore for search.
  desktop:
    entry:
      Name: AI Kindle
      GenericName: PDF Reader
      Comment: AI-assisted PDF reader with annotations, notes, and chat
      Categories: Office;Education;Viewer;Utility;
      Keywords: pdf;reader;ebook;annotations;ai;study;notes;
      Type: Application
      Terminal: false
      # Must match what Electron uses for the X11/Wayland window class —
      # otherwise GNOME shows a generic icon in the dock instead of
      # AI Kindle's icon when the window is focused.
      StartupWMClass: AI Kindle
      StartupNotify: "true"
      MimeType: application/pdf;

  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64

# electron-builder's default .deb maintainer scripts already run
# update-desktop-database and gtk-update-icon-cache on install/remove,
# so no custom fpm hooks are needed.

# ─── Publishing ────────────────────────────────────────────────────────
# No auto-update server configured by default; artifacts go to ./release/.
publish: null
