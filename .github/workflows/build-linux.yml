name: Build Linux installers

on:
  # Manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Attach artifacts to a draft GitHub Release'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

  # Build & publish a real release whenever a v* tag is pushed
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required to create releases / upload assets

jobs:
  build-linux:
    name: Build .deb and .AppImage on Ubuntu
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # electron-builder needs these to assemble .deb packages.
      # ubuntu-latest usually already has them, but install explicitly
      # so the workflow doesn't break if the runner image changes.
      - name: Install Linux packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            fakeroot dpkg rpm libarchive-tools

      - name: Install dependencies
        run: npm ci

      - name: Build renderer + main bundles
        run: npm run build

      - name: Package .deb and AppImage
        env:
          # electron-builder uses this to create releases when publish=always.
          # We default to publish=never and upload artifacts manually for control.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx --no-install electron-builder \
            --linux deb AppImage \
            --x64 \
            --publish never

      - name: List built artifacts
        run: ls -la release/

      - name: Upload artifacts (always)
        uses: actions/upload-artifact@v4
        with:
          name: ai-kindle-linux-x64
          path: |
            release/*.deb
            release/*.AppImage
          if-no-files-found: error
          retention-days: 30

      # On a v* tag OR manual dispatch with create_release=true,
      # attach the artifacts to a draft GitHub Release.
      - name: Create / update GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.create_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          draft: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('build-{0}', github.run_number) }}
          name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('Manual build {0}', github.run_number) }}
          generate_release_notes: ${{ startsWith(github.ref, 'refs/tags/v') }}
          files: |
            release/*.deb
            release/*.AppImage
