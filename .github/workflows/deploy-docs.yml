name: Deploy docs site

on:
  # Rebuild and redeploy on every push to main that touches docs sources
  # or the workflow itself.
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-docs.yml'

  # Allow manual deploys from the Actions tab.
  workflow_dispatch:

# Permissions required by the official Pages deploy action.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one in-flight deployment. Skip stale runs that have been
# superseded by a newer commit.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build VitePress site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so VitePress's `lastUpdated` plugin can read git
          # commit timestamps for each page.
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          # Auto-enable Pages on the repo if it isn't already turned on.
          # Without this, the first run after adding the workflow fails
          # with "Get Pages site failed" because configure-pages can't
          # initialize a Pages site it has no permission to create.
          # `enablement: true` uses the workflow's own pages:write
          # permission to enable Pages and set Source = GitHub Actions.
          enablement: true

      - name: Install dependencies
        run: npm ci

      - name: Build with VitePress
        run: npm run docs:build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
